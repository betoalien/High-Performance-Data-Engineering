# GitHub Pages configuration for "Just the Docs" theme
title: High-Performance Data Engineering
description: A comprehensive course on integrating Python and Rust for high-performance data pipelines
author: Alberto Cardenas

# Theme setup for GitHub Pages
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

# URL configuration
# 'url' is the custom domain, 'baseurl' is the repository name starting with a slash
url: "https://betoalien.com"
baseurl: "/High-Performance-Data-Engineering"

# Aux links (shown in header top right)
aux_links:
  "View on GitHub": "https://github.com/betoalien/High-Performance-Data-Engineering"
  "Alberto Cardenas": "https://betoalien.com"

# Enable search bar functionality
search_enabled: true

# Color scheme (can be 'light' or 'dark')
color_scheme: light

# Mermaid diagrams support
mermaid:
  version: "9.1.3"
  config:
    startOnLoad: true